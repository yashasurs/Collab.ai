version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: colab_backend
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # Required for the backend to spawn isolated docker containers
      - colab_db_volume:/app/data
    environment:
      - PORT=8000
      - FRONTEND_URL=http://localhost:3000
      - DATABASE_URL=sqlite:////app/data/colab.db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: colab_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  colab_db_volume:
